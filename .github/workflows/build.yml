name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyserial pyautogui pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name "Vaha_Listener" vaha_listener.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Vaha_Listener_Windows
          path: dist\Vaha_Listener.exe
